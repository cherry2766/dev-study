<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이미지 업로드</title>
</head>
<body>
<h2>이미지 업로드</h2>

<input type="file" id="imageFile" accept="image/*">
<button type="button" onclick="uploadImage()">업로드</button>

<div id="result"></div>

<script>
    async function uploadImage() {
        const fileInput = document.getElementById("imageFile");
        const resultDiv = document.getElementById("result");

        if (!fileInput.files.length) {
            alert("파일을 선택하세요.");
            return;
        }

        const file = fileInput.files[0];

        const formData = new FormData();
        formData.append("file", file);

        const button = document.querySelector("button");
        button.disabled = true;

        try {
            const response = await fetch("/image/upload", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (data.uploaded) {
                resultDiv.innerHTML = `
                        <p>업로드 성공</p>
                        <p>URL: <a href="${data.url}" target="_blank">${data.url}</a></p>
                        <img src="${data.url}" alt="업로드 이미지" width="300">
                    `;
            } else {
                resultDiv.innerHTML = `<p>업로드 실패</p>`;
                button.disabled = false;
            }
        } catch (error) {
            console.error(error);
            resultDiv.innerHTML = `<p>서버 요청 중 오류가 발생했습니다.</p>`;
            button.disabled = false;
        }
    }
</script>
</body>
</html>
