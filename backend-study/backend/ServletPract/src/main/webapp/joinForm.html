<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>회원가입</title>
</head>
<body>
<h1>회원 가입</h1>
<form name="formJoin" method="post" action="sign-up">
  <table>
  	<tr>
      <td>아이디</td>
      <td><input type="text" name="id"></td>
    </tr>
    
    <tr>
      <td>비밀번호</td>
      <td><input type="text" name="pwd"></td>
    </tr>
    
    <tr>
      <td>성명</td>
      <td><input type="text" name="name"></td>
    </tr>

 	<tr>
      <td>이메일</td>
      <td><input type="email" name="email" ></td>
    </tr>

  </table>
  <input type="submit" value="회원가입">
  <input type="reset" value="취소">
</form>

</body>
</html>
