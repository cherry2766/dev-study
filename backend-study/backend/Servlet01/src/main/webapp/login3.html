<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>파라미터 연습</title>
<script src="jquery-3.7.1.min.js"></script>
<script type="text/javascript">
	// 자바스크립트로 서블릿에 요청
	// JQuery 사용
	$(document).ready(function() {
		$('#login').on('click', function() {
			let id = $('#user_id').val();
			let pw = $('#user_pw').val();

			if (id == "" || pw == "") {
				alert("아이디와 비밀번호는 필수입니다");
				$('#user_id').focus();
			} else {
				$('#formLogin').attr({
					method : "post",
					action : "login4"
				}).submit();
			}

		});
	});
</script>
</head>
<body>
	<form id="formLogin" name="formLogin">
		아이디 : <input type="text" id="user_id" name="user_id"> <br>
		비밀번호 : <input type="password" id="user_pw" name="user_pw"> <br>
		<input type="button" id="login" value="로그인"><input
			type="reset" value="다시입력">
	</form>
</body>
</html>
