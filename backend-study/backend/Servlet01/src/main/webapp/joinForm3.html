<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>회원가입</title>
</head>
<body>
<h1>회원 가입</h1>
<form name="formJoin" method="post" action="memberJoin">
  <table>
    <tr>
      <td>성명</td>
      <td><input type="text" name="name"></td>
    </tr>

    <tr>
      <td>ID</td>
      <td><input type="text" name="id"></td>
    </tr>

    <tr>
      <td>비밀번호</td>
      <td><input type="text" name="pwd"></td>
    </tr>

    <tr>
      <td>휴대폰 번호</td>
      <td><input type="text" name="phone1" style="width:40px;"> - 
      	  <input type="text" name="phone2" style="width:40px;"> - 
      	  <input type="text" name="phone3" style="width:40px;">
      </td>
    </tr>

    <tr>
      <td>학년</td>
      <td>
		  <input type="radio" name="year" value="1">1학년
		  <input type="radio" name="year" value="2">2학년
		  <input type="radio" name="year" value="3">3학년
		  <input type="radio" name="year" value="4">4학년
      </td>
    </tr>

    <tr>
      <td>관심분야</td>
      <td><input type="checkbox" name="interests" value="웹 프로그래밍">웹 프로그래밍
      	  <input type="checkbox" name="interests" value="파이썬">파이썬
          <input type="checkbox" name="interests" value="빅데이터">빅데이터
      	  <input type="checkbox" name="interests" value="자바 프로그래밍">자바 프로그래밍     
      </td> 
    </tr>

    <tr>
      <td>학과</td>
      <td><select name="department">
    		<option value="">선택하세요</option>
    		<option value="컴퓨터공학과">컴퓨터공학과</option>
    		<option value="디자인학과">디자인학과</option>
    		<option value="방송연예과">방송연예과</option>
    		<option value="경영학과">경영학과</option>
    		<option value="심리학과">심리학과</option>
		  </select>
	  </td>
    </tr>
  </table>
  <input type="submit" value="완료">
  <input type="reset" value="취소">
</form>

</body>
</html>
