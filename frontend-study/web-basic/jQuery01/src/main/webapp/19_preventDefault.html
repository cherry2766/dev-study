<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>preventDefault()</title>
		<link rel="icon" type="image/png" href="#" />
		<script src="jquery-3.7.1.min.js"></script>
		<script type="text/javascript">
			// 문서(document)가 준비 완료되면 함수 실행 
			$(document).ready(function() {
				  // event 발생시 전달되는 객체 event는 preventDefault() 사용
				  $('#link').on('click', function(e){
					  e.preventDefault();
					  alert("일시적 이동 정지");
					  // return false;
				  });
				
				// 문서 상에서 오른쪽 마우스 클릭했을 때 기본으로 출력되는 팝업메뉴 차단 
				  document.oncontextmenu = function(e) {
					  e.preventDefault();
					  alert("오른쪽 마우스 사용 금지");
				  };

			});
		</script>
	</head>
	<body>
		<!--  <a> 태그는 클릭하면 다른 문서(사이트)로 이동하는 기본 동작이 있음 (href) -->
		<a href="https:www.naver.com" id="link">네이버로 이동</a>
	</body>
</html>
