<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		<script src="jquery-3.7.1.min.js"></script>
		<script type="text/javascript">	
		  $(document).ready(function() {
			   //객체 추가
			   let output = "";
			   for(let i=0;i<256;i++) {
				   output += "<div></div>";
			   }
			   document.body.innerHTML = output;
		  
		
		     //스타일 적용
		     $('div').css({
		    	 height:"2",
		    	 backgroundColor:function(i) { //i값은 div 참조 선택의 idx가 자동 적용됨
		    		 console.log('rgb('+i+','+i+','+i+')');
		    		 return 'rgb('+i+','+i+','+i+')';
		    	 }
		     });     
		  });
		</script>
	</head>
	<body>
	
	</body>
</html>
