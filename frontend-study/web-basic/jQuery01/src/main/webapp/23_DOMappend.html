<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>append()/prepend()/after()/before()</title>
        <style type="text/css">		 	
			#box { width:500px; height: 200px; line-height:200px; 
			                  border:1px solid #000; }
			img {vertical-align:middle;}					
		</style>	
		<script src="jquery-3.7.1.min.js"></script>
		<script type="text/javascript">
			$(document).ready(function() {		  
			// <img> 태그 내용을 img 변수에 저장
          let img = "<img src='image/banana.png'>";
			    
			// [prepend] 버튼 클릭했을 때
          $('#prepend').on('click',function(){
        	  $('#box').prepend(img); //객체 box 내부의 기존 요소 유지하면서 맨 앞 요소로 추가
          });
			   
			// [append] 버튼 클릭했을 때
          $('#append').on('click',function(){
            $('#box').append(img); //객체 box 내부의 기존 요소 유지하면서 맨 뒤 요소로 추가
          });
			
			// [before] 버튼 클릭했을 때
          $('#before').on('click',function(){
        	  $('#box').before(img);
          });
			
			// [after] 버튼 클릭했을 때
          $('#after').on('click',function(){
            $('#box').after(img);
          });
			
			// [empty] 버튼 클릭했을 때
          $('#empty').on('click',function(){
        	  //기준객체(여기서는 box) 내부의 모든 요소 삭제
            $('#box').empty(img);
          });
			
			// [remove] 버튼 클릭했을 때
          $('#remove').on('click',function(){
            $('img').remove();
          });
			
			// [초기화] 버튼 클릭했을 때
			// box 내부 요소를 처음 실행했을때처럼 구성
          $('#initiate').on('click',function(){
             $('#box').empty().append("div 내부 <img src='image/apple.png'>");
             //$('#box').html("div 내부 <img src='image/apple.png'>");
          });
			});
			//전체 초기화를 하려면? 버튼, 박스는 남기고
			
		</script>
	</head>

    <body>
        <button id="prepend" >prepend</button> 
        <button id="append" >append</button> 
        <button id="before" >before</button> 
        <button id="after" >after</button> 
        <button id="empty" >empty</button> 
        <button id="remove" >remove</button> 
        <button id=initiate >초기화</button>
        <p>
        <div id="box">
        	div 내부 <img src='image/apple.png'>
        </div>    
    </body>
</html>
