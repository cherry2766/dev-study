<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>DOM : attr() : 속성 변경</title>
		<style type="text/css">
			div {margin:0 auto; width:800px;}
			img {width:200px; height:100px;}			
		</style>
		
		<script src="jquery-3.7.1.min.js"></script>
		<script type="text/javascript">
		 $(function(){

		      $('img').each(function(idx){ // img 4개를 순회
		        let beforeImg = $(this).attr('src'); // 각각 원래 이미지 저장
		        $(this)
		        .on('mouseover',function(){ // 마우스 올리면 idx값에 맞게 이미지 변경
		          $(this).attr('src','image/img2-' +(idx+1)+ '.jpg');
		        })
		        .on('mouseout',function(){ // 마우스 떼면 원래 이미지로 변경
		          $(this).attr('src',beforeImg);
		        })
		      });


		    });
		</script>
	</head>
	<body>
		<div><img src = "image/img1-1.jpg"><img src = "image/img1-2.jpg"><img src = "image/img1-3.jpg"><img src = "image/img1-4.jpg"></div>		
	</body>

</html>
