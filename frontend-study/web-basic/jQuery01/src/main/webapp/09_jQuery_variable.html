<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>jQuery 변수</title>
		<script src="jquery-3.7.1.min.js"></script>
		<script type="text/javascript">
			$(document).ready(function() {
				// jQuery 변수 :  $ 붙임
        let $box1 = $('#box1');
				// jQuery 메소드 사용 가능
        $box1.css('color','red');
				//box1.innerHTML = typeof $box1; // 자바스크립트 id=box1인 것
				box1.innerHTML = typeof $box1
				
				// $ 안 붙인 변수
 				// jQuery 선택자

 				// jQuery 메소드 사용 가능
        let div = $('div');
				div.css('color','green');
				
				// 자바스크립트 사용 DOM 요소 찾아서 jQuery 메소드 사용할 경우
				//let box3 = document.getElementById('box3');
				//box3.css('color','blue');
				
				 // jQeury 메소드 사용할 수 없음 (불가)				
				 
				 let $div2 = $('div').length;
				 box2.innerHTML = typeof $div2; //일반값 저장
				  //js 규칙상 태그의 id 활용해서 직접 접근 가능
				  //일반 데이터 저장시 js 변수 사용하는걸 권장함
				  
				  //일반적으로 값 저장 용도 : $없이 변수 사용
				  //객체 저장 시: $추가하여 jQuery 변수 사용
				
			});
		</script>
	</head>
	<body>
		<div id="box1">box1</div>
		<div id="box2">box2</div>
		<div id="box3">box3</div>
	</body>
</html>
