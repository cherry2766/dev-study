<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		<style>
			div {
				width:100px;
				height:50px;
				line-height:50px;
				text-align:center;
				color:white;
				background-color:teal;
				border-radius:20px;
			} 
		</style>
		<script src="jquery-3.7.1.min.js"></script>
		<script type="text/javascript">			
			$(document).ready(function(){
				
				$('div').on('click',function(){ // div태그 클릭하면 새로운 버튼2개 생성
					$(this).after("<p> <button id=newBtn1>새 버튼1</button> </p> <p> <button id=newBtn2>새 버튼2</button> </p>");
				});
				
				$(document)
				  .on('mouseenter','#newBtn1', function() { //마우스 올리면 배경색 변경
					    $(this).css('backgroundColor','green');
					})
				  .on('mouseleave','#newBtn1', function() { //마우스 떼면 배경색 변경
					    $(this).css('backgroundColor','yellow');
				  })
				  .on('click','#newBtn1',function() { //새 버튼1 클릭시 새창에서 네이버 사이트로 연결
              window.open('http://www.naver.com');
          });
 
			});
		</script>			
	</head>
	<body>
		<div>버튼</div>
	</body>
</html>
