<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>윈도우 이벤트 : 이미지 크기 동적 변경</title>
		<script src="jquery-3.7.1.min.js"></script>
		<style>
			* {margin:0;padding: 0;}
			html, body {width: 100%; height: 100%;}
			#topImgBox, #topImg {width: 100%; height: 100%;}
			/* img { width:100%;}  */
		</style>
		<script type="text/javascript">
			$(document).ready(function() {
							
					 function imgResize() {
						  let winWidth = $(window).width();
						  let winHeight = $(window).height();
						  
						  $('#topImgBox').css({
							  width: winWidth,
							  height: winHeight
						  });
						  
					};
					
					imgResize();
					
					$(window).resize(imgResize);

			});
		</script>
	</head>
	<body>
		<div id="topImgBox"><img src="image/topImg.jpg" id="topImg"></div>
	</body>
</html>
