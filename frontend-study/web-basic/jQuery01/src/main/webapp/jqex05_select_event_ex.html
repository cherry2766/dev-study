<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		<style>
		  * {text-align:center}
		  
		  table {
		    margin:0 auto;
		    width:500px;
		    height:400px;
		    border:solid 3px Gray;
		    border-collapse: collapse;
		  }
		  
		  th {
		    background:#003366;
		    color:white;
		  }
		  
		  tr, th, td {border:solid 3px Gray;}
     
      th, td { width:120px;}
      
      td select {width:180px;}

		</style>
		<script src="jquery-3.7.1.min.js"></script>
		<script type="text/javascript">	
		  $(function(){
			  const basePrice = 4500000;
			  
			  function totalCalc() {
				  let total = basePrice;
				  
				  let baseoptionPrice = Number($('#selectoption').val());
				  total += baseoptionPrice;
				  
				  let selectoptionPrice = $('input[type="checkbox"]:checked');
						  selectoptionPrice.each(function() {
							  total += Number($(this).val());
						  });
				    
				  $('#order').text(total.toLocaleString() + ' 원');
  
			  }
			  
			  $('#selectoption').on('change', totalCalc);
			  $('input[type=checkbox]').on('change', totalCalc);
		  });
		
		</script>
	</head>
	<body>
	
	   <h1>카메라 주문서</h1>
	     <table>
	       <tr><td colspan="3"> <img src="image/camera.jpg"> </td></tr>
	       <tr><th>기본 가격</th><td colspan="2">4,500,000 원</td></tr>
	       <tr><th>기본 옵션</th><td colspan="2" >
	                 <select id="selectoption">
	                    <option value="0">선택하세요</option>
	                    <option value="100000">기본 렌즈 킷 (18–55mm) + 100,000원</option>
	                    <option value="200000">고급 렌즈 킷 (24–70mm) + 200,000원</option>
	                    <option value="300000">브이로그 / 유튜브 세트 + 300,000원</option>
	                    <option value="500000">풀 패키지 세트 + 500,000원</option> 
                   </select></td></tr>
	       <tr><th>선택 옵션</th><th>가격</th><th>선택</th></tr>
	       <tr><td>DSLR 가방</td><td>30,000 원</td><td><input type="checkbox" value="30000"></td></tr>
	       <tr><td>삼각대</td><td>20,000 원</td><td><input type="checkbox" value="20000"></td></tr>
	       <tr><td>청소도구</td><td>7,000 원</td><td><input type="checkbox" value="7000"></td></tr>
	       <tr><th>주문액</th><td colspan="2" id=order>4,500,000 원</td></tr> 
	     </table>
	
	</body>
</html>
