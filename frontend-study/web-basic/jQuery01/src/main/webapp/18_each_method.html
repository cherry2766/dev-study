<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>each() 메소드</title>
		<link rel="icon" type="image/png" href="#" />
		<script src="jquery-3.7.1.min.js"></script>
		<script type="text/javascript">
			// 문서(document)가 준비 완료되면 함수 실행 
			$(document).ready(function() {
				// $(선택자).each(콜백함수); 
				$('div').each(function(index) {
					console.log($(this).text()); //객체.text() : 참조 객체의 내부 텍스트 반환, 객체.text('a') : 인수로 전달되는 값은 참조객체의 내부 텍스트로 설정
				});
				
				$('div').each(function(index,value) {
          console.log(value);
          console.log(index);
        });
				
				// $.each(배열, 콜백함수)
				let names = ["홍길동","이몽룡","성춘향","변학도"];
				  $.each(names,function(index,value) {
					  console.log(index + ":" + value);
				  });
							
				// 사용자 정의 객체
				let car = {
						no : '11가1111',
						name:'소나타',
						maker:'현대',
						cc:2000,
						year:2022
				};
				
				//  $.each(객체, 콜백함수)
				  $.each(car, function(props,value) {
					  console.log(props + ":" + value);
					  
				  });
				
			});
		</script>
	</head>
	<body>
		<div>a</div>
		<div>b</div>
		<div>c</div>
	</body>
</html>
