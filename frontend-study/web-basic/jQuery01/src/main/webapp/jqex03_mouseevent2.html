<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		<style>
			div {
				width:100px;
				height:50px;
				line-height:50px;
				text-align:center;
				color:white;
				background-color:yellow;
				border-radius:20px; 
			} 
		</style>
		<script src="jquery-3.7.1.min.js"></script>
		<script type="text/javascript">			
			$(document).ready(function(){
				  let colors = ['red','green','blue']; //변경될 색 저장
				  let index = 0; //인덱스 변수
				  
				  $('div')
				  .css('backgroundColor',colors[index]) // 실행하면 div태그 박스 빨간색
				  
				  .on('click',function(){   // 클릭할때마다 색 변경
					  index = (index+1) % colors.length; // 색 변경하기 위해 인덱스 변수 변경
					  $(this).css('backgroundColor',colors[index]);			  
				  });
				  
			});
		</script>			
	</head>
	<body>
		<div>클릭</div>
	</body>
</html>
