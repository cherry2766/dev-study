<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>css 연습문제</title>
	<style type="text/css">
		#container {
			margin:0 auto;
			width:480px;
			height:200px;
			position:relative;
			border:3px solid #000;
			padding:25px;			
		}
		h1 {
			background-color:navy;
			color:white;
			width:210px;
			height:45px;	
			display:inline;
		}		
		#head {
			padding-top:10px;
			padding-bottom:10px;			
		}
		p span {
			color:red;
			font-weight:bold;
		}	
		
	</style>
</head>
<body>
	<div id="container">
		<h1>탐라국 입춘굿</h1>
		<p id="head">제주도의 문화축제 중에서 유일하게 <span>탐라 시대부터 내려온 축제</span>이다.</p>
		<p>제주에서 입춘은 새철<sup>(제주어, 샛절)</sup>드는 날이라 한다.</p>
		<p>하늘의 1만8000신이 지상으로 내려와 새해 일들을 시작하는 때다.</p>
	</div>
</body>
</html>
