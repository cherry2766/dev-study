<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>css 연습문제</title>
<style>
	/* 현재 문서 전체에 css 적용 */
	/* id 속성을 활용한 선택자(문서내에 동일값의 id가 있으면 안됨, 중복 안됨) : #id 속성값 */
	/* #container 선택된 태그에 적용할 css를 나열, 구분자로 ; 사용 */
	#container {
		margin: 0 auto; /* 화면 중앙에 오도록 지정, but 이렇게 하려면 width 값을 반드시 줘야함 */
		width: 600px;/* 가로 너비, % 단위 사용 가능 */
		border:  3px solid #000;
		padding-left: 30px;
		}
	/* 태그 선택자 - 문서내 모든 동일태그에 대해서 css 적용 */
	/* h1의 width는 변경하지 않으면(block 속성) 왼쪽끝~오른쪽끝(기준은 상위태그) */
	/* display 속성을 활용해서 태그 영역 변경 가능
	   block : 상위 태그 영역
	   inline : 컨텐츠(text)만큼의 영역, p 적용은 안됨
	   inline-block : 컨텐츠만큼의 영역, p 적용 */
	h1 { 
		background: navy; /* 배경색 */
		color: white; /* 글자색 */
		display: inline-block;		
		}	
	/* class 선택자 기호 : .클래스속성값 (서로다른 태그에 동일한 css 적용하기 위해 사용) */
	.accent {
		color: red;
		font-weight: bold;
		}
		
	

</style>
</head>
<body>
	<div id="container">
		<h1>탐라국 입춘굿</h1>
		<p>제주도의 문화축제 중에서 유일하게 <span class="accent">탐라 시대부터 내려온 축제</span>이다.</p>
		<p>제주에서 입춘은 새철<sup>(제주어,샛절)</sup> 드는 날이라 한다.<br>
		하늘의 1만8000신이 지상으로 내려와 새해 일들을 시작하는 때다.</p>
	
		<img src="image/img1.png"> <!-- src 경로의 이미지 파일을 서버에게 요청함 -->
	</div>
</body>
</html>
