<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>가상요소 예제</title>
<style>
	/*"👉"*/
	p::before {
		content:"👉";
		margin-right:0.3em;	
	}
  
	p::after {
		content:"👉";
		margin-left:0.3em;	
	}
	
	li::marker {
		color:red;
		font-size:0.8em;
	}
</style>
</head>

<body>
<p>
    문단의 콘텐츠입니다.
</p>
<ul>
    <li>라면</li>
    <li>김밥</li>
    <li>돈까스</li>
</ul>
</body>
</html>
