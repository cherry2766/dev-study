<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>미디어 쿼리</title>
		<style>
			/* 미디어쿼리 활용 문서의 배경색 변경 - body 태그 활용 
			   조건의 접두어 min -> 이상의 의미이므로 작은조건부터 나열*/
			   
			@media all and (min-width:320px) {
				body {background:red;}
			}
			@media all and (min-width:768px) {
				body {background:green;}
			}
			@media all and (min-width:960px) {
				body {background:yellow;}
			}
			
			
			* { margin:0; padding:0; }
			
			div {
				margin:0 auto;
				width:50%;
				max-width:420px; 
				max-height:420px; 
			} 
			
			img {
				width:100%;
				height:auto;
				border:solid 1px black;
			} 
		 
		</style>
	</head>
	<body>
			<div>
				<img src="image/사진.jpg">
			</div>
	</body>
</html>
