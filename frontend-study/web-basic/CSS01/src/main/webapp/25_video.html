<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>비디오 태그</title>
<style type="text/css">
	video {
		/* width:100%; 브라우저 화면 크기에 따라 최대로 커짐 */
		/* max-width:100%; 태그의 자체 크기 이상으로 커지지 않음, 작아질 순 있음 */
	}
</style>
</head>
<body>
	<div>
		<video poster="media/poster.jpg" width="640" height="360" controls> <!--영상 표현 태그 poster:첫화면이미지,controls:패널 표현 여부-->
			<source src="media/Wildlife.mp4" type="video/mp4" /> <!--실행할 영상의 종류 및 경로-->
			
			<track src="media/track.vtt" kind="captions" srclang="ko" label="Korean" /> <!--자막 태그, srclang : 자막 언어 종류-->
			<track src="media/track2.vtt" kind="captions" srclang="eng" label="English" />
		</video>
	</div>
</body>
</html>
