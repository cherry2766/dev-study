<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
	<style>
		div {
			border:1px solid black;
			width:500px;
			height:150px;
			margin:0 auto;
		}
		h1 {
			background:black;
			color:white;
			width:200px;
			text-align:center;
			margin-left:20px;		
		}
		#list {list-style:none;}
		#list li:nth-child(2) {color:red;}
		#list li:nth-child(3) {color:green;}
		li {font-weight:bold;}
		li {display:inline-block; width:30%;}
	
	</style>
</head>
<body>
	<div>
		<h1>웹 기술 - 기본</h1>
			<ul id="list">
				<li>HTML</li>
				<li>CSS</li>
				<li>Javascript 기초</li>		
			</ul>
	</div>
</body>
</html>
