<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>플렉서블 박스-플렉서블 아이템 추가-방향(column)</title>
<style>
    * {margin:0; padding:0;}
  /* div 태그 display 기본값이 block */
  .container {
    width:500px;
    height:300px;
    border:solid 1px black;
    margin:5px;
  }
  
  .container div {
    /* width:20%; */ 
    height:10%;
  }
  
  .container div:nth-child(1) {background:red;}
  .container div:nth-child(2) {background:blue;}
  .container div:nth-child(3) {background:yellow;}
  
  .container {
   display:flex;
   flex-direction:column;
   /*flex-direction:column-reverse;*/
   /*item 정렬*/
   /* justify-content:space-evenly; 아이템 배치 후 생성되는 여백이 모두 동일*/
   justify-content:flex-start;
  }
</style>
</head>
<body>
			<div class="container">
				<div></div><div></div><div></div>
			</div>
			
			<div class="container">
				<div></div><div></div><div></div>
			</div>			
</body>
</html>
