<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>속성 선택자</title>
<style type="text/css">
	input[type="text"] {background:red;} /* []를 이용해서 태그의 속성을 선택할 수 있음 */
	input[type="password"] {background:blue;}
</style>
</head>
<body>
	<form>
		<input type="text">
		<input type="password"><br>
		<input>
		<input type="password"><br>
	</form>
</body>
</html>
