<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>회원 가입 폼</title>
</head>
<body>

<h2 align="center">회원가입</h2>
<hr>

<form method="post" action="newMember.jsp">
<table align="center">

<tr>
	<td><label for="name">성명</label></td>
	<td><input type="text" id="name" name="name" size="20" required></td>
</tr>

<tr>
	<td><label for="userid">아이디</label></td>
	<td>
		<input type="text" id="userid" name="id" size="20" maxlength="10" required>
		<input type="button" value="ID중복체크">
		(영문자+특수문자: 6~10자)
	</td>
</tr>

<tr>
	<td><label for="passwd">비밀번호</label></td>
	<td>
		<input type="password" id="passwd" name="passwd" size="20" maxlength="20" required>
		(영문자+숫자+특수문자: 10~20자)
	</td>
</tr>

<tr>
	<td><label for="passwd2">비밀번호 확인</label></td>
	<td><input type="password" id="passwd2" name="passwd2" size="20" maxlength="20" required></td>
</tr>

<tr>
	<td><label for="year">생년월일</label></td>
	<td>
		<input type="text" id="year" name="year" size="4"> 년
		<select name="month">
			<option value="1" selected>1</option>
			<option value="2">2</option>
			<option value="3">3</option>
			<option value="4">4</option>
			<option value="5">5</option>
			<option value="6">6</option>
			<option value="7">7</option>
			<option value="8">8</option>
			<option value="9">9</option>
			<option value="10">10</option>
			<option value="11">11</option>
			<option value="12">12</option>
		</select> 월
		<select name="day">
			<option value="1" selected>1</option>
			<option value="2">2</option>
			<option value="3">3</option>
			<option value="4">4</option>
			<option value="5">5</option>
			<option value="6">6</option>
			<option value="7">7</option>
			<option value="8">8</option>
			<option value="9">9</option>
			<option value="10">10</option>
			<option value="11">11</option>
			<option value="12">12</option>
			<option value="13">13</option>
			<option value="14">14</option>
			<option value="15">15</option>
			<option value="16">16</option>
			<option value="17">17</option>
			<option value="18">18</option>
			<option value="19">19</option>
			<option value="20">20</option>
			<option value="21">21</option>
			<option value="22">22</option>
			<option value="23">23</option>
			<option value="24">24</option>
			<option value="25">25</option>
			<option value="26">26</option>
			<option value="27">27</option>
			<option value="28">28</option>
			<option value="29">29</option>
			<option value="30">30</option>
			<option value="31">31</option>
		</select> 일
		<label>
			<input type="radio" name="cal" value="양력" checked> 양력
		</label>
		<label>
			<input type="radio" name="cal" value="음력"> 음력
		</label>
	</td>
</tr>

<tr>
	<td>전화번호</td>
	<td>
		<select name="tel">
			<option value="02" selected>02</option>
			<option value="031">031</option>
			<option value="041">041</option>
		</select> -
		<input type="text" size="4"> -
		<input type="text" size="4">
	</td>
</tr>

<tr>
	<td>휴대폰</td>
	<td>
		<select name="phone1">
			<option value="010" selected>010</option>
			<option value="070">070</option>
		</select> -
		<input type="text" size="4"> -
		<input type="text" size="4">
	</td>
</tr>

<tr>
	<td><label for="addr1">주소</label></td>
	<td>
		<input type="text" id="addr1" size="20" required>
		<input type="button" value="우편번호찾기"><br>
		<input type="text" size="30"><br>
		<input type="text" size="30"> 상세 주소 입력
	</td>
</tr>

<tr>
	<td>성별</td>
	<td>
		<label>
			<input type="radio" name="gender" value="남" checked> 남
		</label>
		<label>
			<input type="radio" name="gender" value="여"> 여
		</label>
	</td>
</tr>

<tr>
	<td><label for="job">직업</label></td>
	<td>
		<select name="job" id="job">
			<option value="프로그래머" selected>프로그래머</option>
			<option value="요리사">요리사</option>
			<option value="정비사">정비사</option>
		</select>
	</td>
</tr>

<tr>
	<td>이메일</td>
	<td>
		<label>
			<input type="text" size="10"> @
		</label>
		<select name="email">
			<option value="naver.com" selected>naver.com</option>
			<option value="nate.com">nate.com</option>
			<option value="hanmail.net">hanmail.net</option>
		</select>
	</td>
</tr>

<tr>
	<td>이메일 수신</td>
	<td>
		<label>
			<input type="radio" name="mail" value="예" checked> 예
		</label>
		<label>
			<input type="radio" name="mail" value="아니오"> 아니오
		</label>
	</td>
</tr>

<tr>
	<td>관심분야</td>
	<td>
		<label>
			<input type="checkbox" value="front" checked> 프론트엔드
		</label>
		<label>
			<input type="checkbox" value="back"> 백엔드
		</label>
		<label>
			<input type="checkbox" value="full"> 풀스택
		</label>
		<label>
			<input type="checkbox" value="java"> 자바 프로그래밍
		</label>
	</td>
</tr>

<tr>
	<td colspan="2" align="center">
		<input type="submit" value="회원가입">
		<input type="reset" value="취소">
	</td>
</tr>

</table>
</form>

</body>
</html>
