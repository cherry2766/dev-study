<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>이미지맵</title>
    <style>
    	div {margin:0 auto; width:1200px; text-align:center;}
    </style>
</head>
<body>
	<div>
		<img src="image/메인.png" border="1" usemap="#cityMap">
		<map name="cityMap">
			<area shape="rect" coords="60,90,250,150" href="뉴욕.html">
			<area shape="rect" coords="310,90,500,150" href="파리.html"> 
			<area shape="rect" coords="560,90,750,150" href="로마.html"> 
			<area shape="rect" coords="810,90,1000,150" href="베이징.html">  
		</map>
	</div>
</body>
</html>


<!-- usemap은 이미지 한 장에 여러 개의 클릭 영역(링크)를 만들 때 사용하는 속성
	 <map> + <area> 태그와 함께 동작
	 이미지의 특정 부분을 눌렀을 때 각각 다른 링크로 이동
	 usemap="#cityMap" → # 꼭 필요 (#은 문서 내부 식별자, 같은 페이지 안의 ~로 이동)
	 <map name="cityMap"> → usemap과 이름이 같아야 함 -->
