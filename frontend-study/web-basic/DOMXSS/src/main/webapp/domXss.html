<html>
<script
	src="http://ajax.googleapis.com/ajax/libs/jquery/1.7.1/jquery.min.js"></script>
<script type="text/javascript">
	// 사용자가 input 태그에 입력한 값을 특정영역에 표현하는 함수
	function testIt() {
		let input = document.getElementById("input-test").value;
		let testInnerHTML = document.getElementById("test-innerHTML");
		let testHTML = document.getElementById("test-html");
		// html 태그가 해석될 수 있는 속성이나 메서드를 사용하면
		testInnerHTML.innerHTML = input; // html 태그를 해석
		// $(testHTML).html(input); // 스크립트도 실행시킴
		$(testHTML).text(input); // 입력값 그대로 출력 처리하게됨(text 처리 후)
	}
</script>
<head>this is a test
</head>
<body>
	<input id="input-test" type="text" name="foo" />
	<input type="button" onClick="testIt();" value="test!" />
	<div id="test-html"></div>
	<div id="test-innerHTML"></div>
</body>
