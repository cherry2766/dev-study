<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
        <title>Math.random()</title>       
        <script type="text/javascript">	
           //Math 객체는 선언없이 사용하는 static 객체
           //random() : 0.0x ~ 0.9x 범위의 실수값을 무작위로 한개 반환하는 함수
           for (let i=1;i<=-1;i++)
        	   document.write(Math.random() + "<br>");
           
           document.write("<hr>")
           
           for(let i=1;i<=10;i++) {
             let num = Math.floor(Math.random()*5); // 실수 형태의 난수를 * 5으로 1자리 정수를 만들고 소수점 이하는 버림(0~4사이의 난수)
             document.write(num + "<br>");
           }
      
           document.write("<hr>")
             
           for(let i=1;i<=10;i++) {
             let num = Math.floor(Math.random()*10); // 실수 형태의 난수를 * 10으로 1자리 정수를 만들고 소수점 이하는 버림(0~9사이의 난수)
             document.write(num + "<br>");
           }
           
           document.write("<hr>")
 
           // 1부터 10사이의 난수
           for(let i=1;i<=10;i++) {
	           let num = Math.floor(Math.random()*10)+1; // 실수 형태의 난수를 * 10으로 1자리 정수를 만들고 소수점 이하는 버림(1~10사이의 난수)
	           document.write(num + "<br>");
           }
           
           
        </script>     
    </head>
    
    <body>
    </body>
</html>
