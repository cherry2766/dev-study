<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>addEventListener()</title>
		<script type="text/javascript">
			window.onload = function() {
				  let box = document.getElementById('box');
				  
				  // mousedown 이벤트 처리
				  // 이벤트가 발생하면 리스너나 핸들러는 발생 이벤트에 대한 정보를 콜백함수로 전달함
				  // 전달되는 정보를 받아서 처리에 사용하려면 콜백함수에 매개변수를 설정해야함
				  // 전달 정보는 이벤트 객체가 전달됨
				  // event.currentTarget : 이벤트가 발생한 대상의 참조값이 저장된 속성
				  box.addEventListener('mousedown', event => {
					  event.currentTarget.style.backgroundColor='green'; //event.currentTarget : id가 box인 객체를 반환함
				  });
				  
				  box.addEventListener('mouseup', () => {
					  box.style.background = 'white';
				  });
			};
			
		</script>
	</head>
	<body>
		<div id="box">클릭</div>
	</body>
</html>
