<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>forEx1</title>
		<script type="text/javascript">	
		  var i;
		  let plus = 0;
		  let minus = 0;
		  let zero = 0;
		  
		  for(i=1;i<=10;i++) {
			  let num = Number(prompt("숫자" + i + " 입력 :" ));
			  if(num>0) {
				  plus++;
			  }
			  else if(num<0) {
				  minus++;  
			  }
			  else {
				  zero++;
			  } 
		  }
		  
		  document.write("양수의 개수 : " + plus + "<br>");
		  document.write("음수의 개수 : " + minus + "<br>");
		  document.write("0의 개수 : " + zero);
		</script>
	</head>
	<body>
	
	</body>
</html>
