<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>querySelectorAll()</title>
		<script type="text/javascript">
		  //선택자가 선택하는 모든 객체 배열형태(node list)로 반환
		  window.onload = function() {
			  let header = document.querySelectorAll('h1'); //문서내의 모든 h1 태그의 참조값 반환(집합형으로 반환)
			  
			  //header 변수의 참조값은 node list(배열과 유사) 객체를 참조
			  //h1 태그객체의 속성 변경(모든 h1 태그에 대해 적용)
			  for(let i=0;i<header.length;i++) {
				   let header_item = header[i]; //dom 객체 참조값 반환
				   header_item.style.color='orange';
				   header_item.style.background='red';
				   header_item.style.width='50%';
				   header_item.innerHTML='From JavaScript';
			  }
			  //querySelectorAll()로 반환되는 참조값의 type 확인(NodeList-배열과 유사하지만 동적 생성 가능한 list)
			  //자바스크립트 배열은 아니므로 사용불가능한 배열의 기능들이 있음
			  //인덱스 사용 가능/forEach 사용 가능
			  console.log(Object.prototype.toString.call(header));
			  
			  //forEach 사용 : 배열의 기능 forEach 사용하는 것이 아니고 nodelist의 메서드 forEach 사용 가능
				  header.forEach((item) => {
					  item.style.color='white';
				  })
		  }

		</script>
	</head>
	<body>
		<h1>Header</h1>
		<h1>Header</h1>
		<h1>Header</h1>
	</body>
</html>
