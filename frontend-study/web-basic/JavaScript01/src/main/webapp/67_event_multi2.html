<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>addEventListener() : 동일 이벤트 여러 번 적용 가능</title>
		<script type="text/javascript">
			window.onload = function() {
				  let btn = document.getElementById("btn");
				  btn.addEventListener("click",show1);
				  btn.addEventListener("click",show2);
				  // 함수 이름을 콜백 함수로 전달 가능
				  // 함수가 공유할 필요가 없는 1회성 함수면 함수 선언코드를 전달(화살표 함수)
				  btn.addEventListener("click",()=>alert("실행2"));
				  
			};
			
			function show1() {
				alert("실행1");
			}
			
			function show2() {
				alert("실행2");
			}
			
			
		</script>
	</head>
	<body>
		<button id="btn">클릭</button>
	</body>
</html>
