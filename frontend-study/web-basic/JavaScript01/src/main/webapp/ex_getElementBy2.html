<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">   
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>자바스크립트 연습</title>
      <script>
        window.onload = function() {
			      let btn = document.querySelectorAll('button'); //문서에 태그가 여러개 있을 수 있으므로 집합형태(node list)로 반환
			      let p = document.getElementsByTagName('p');  //문서에 태그가 여러개 있을 수 있으므로 집합형태(HTML collection)로 반환
			      let span = document.getElementById('mySpan');
			      let toggle = true; //border 버튼이 반영되어 테두리가 추가되지 않은 상태를 초기값
			      
					  btn[0].onclick = () => {
						  if(toggle) {
							  span.style.border = "dotted 2px violet";
						    toggle=false;
						  }
						  else {
							  span.style.border = 'none';
							  toggle=true;
						  }
					  }
					  
					  btn[1].onclick = () => {
						  alert("문서내 p태그의 개수는" + p.length);
					  }

        };
			</script>
</head>
<body>
  <h3>자바스크립트란?
      <button>border</button>
      <button>p</button>
    </h3>
    <hr>
    <p>자바스크립트는 웹 프로그래밍 언어로서 웹 페이지를 동적 변경시킬 수 있다.</p>
    <p><span id="mySpan">C 언어</span>를 아는 사용자는 빠르게 학습할 수 있다.</p>
    <p>이벤트 등 GUI 프로그래밍에 필요한 요소들이 있어 학습에 약간의 어려움이 있다.</p>
</body>
</html>
