<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
    	<title>함수의 반환 값</title>
        <script type="text/javascript">
				  //숫자 2개를 입력 받아서 두 수의 합을 구하여 반환하는 함수
					function input() {
				    	let num1 = Number(prompt("숫자 1 입력"));
				    	let num2 = Number(prompt("숫자 2 입력"));
				    	return num1 + num2; //함수를 종료 시키고 호출한 곳으로 값을 반환(반환 값이 없으면 정해진 기본값이 반환됨)
					}
		
					document.write("합계 : " + input()); // document.write() 메서드가 호출되기 전에 함수 인수가 함수 호출코드로 들어가 있음
					// 1. input() 함수가 먼저 호출되고 종료 되어야 document.write() 메서드가 호출됨	- 함수의 동기식 호출	
		   </script>
    </head>
    
    <body>
    </body>
</html>
