<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>prompt 함수</title>
    <script type="text/javascript"> 
      var answer = prompt("가장 좋아하는 과일은?","사과");
      alert("가장 좋아하는 과일은 " + answer + "입니다"); // + 문자열 개체(문자열을 저장하고 있는 변수 포함) 결합 연산자로 사용가능
      document.write("가장 좋아하는 과일은 <b>" + answer + "</b>입니다");
    
    </script>
  </head>
  <body>
  
  </body>
</html>
