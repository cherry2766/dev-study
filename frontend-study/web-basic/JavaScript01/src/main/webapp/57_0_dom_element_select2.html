<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		<script type="text/javascript">	
		//script 코드는 먼저 표기하고 실행되어야 하는 시점에 대한 이벤트를 연결해서 작업
		    window.onload = function() { //이벤트 핸들러 함수
			  let box = document.getElementById('box'); 
			  box.innerHTML="변경";
			}
		</script>
	</head>
	<body>
	
	<div id="box">box</div>

	</body>
</html>
