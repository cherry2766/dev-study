<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>substring()</title>
		<script type="text/javascript">
			var birth = prompt("생년월일 입력 (예 : 19980125)");
			let year = birth.substring(0,4); //1~4번째 문자열
			let month = birth.substring(4,6); //5~6번째 문자열
			let date = birth.substring(6,8); //7~8번째 문자열

			
			document.write(year + " 년 " + month + " 월 " + date + " 일에 태어나셨군요");

		</script>
	</head>
	<body>
		
	</body>
</html>
