<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
        <title>함수 예제</title>
        <script type="text/javascript">		
          //함수 선언 형식
          //1. 일반적인 함수 선언 : 메시지를 출력하는 함수(출력만 할 것이기 때문에 매개변수는 필요 없음)
          function show() {
        	  // 코드를 나열
        	  alert("show()함수 입니다");
          }
        
          //함수 실행 시점 - 호출되는 시점에 함수 실행
          show();
          
          //2. 스스로 동작하는 함수(1회성 함수) - 호출문을 다른 곳에 만들지 않음
          //아래 코드는 함수 호출문을 포함하고 있음
          (function() {
        	  alert("함수 호출 없이도 자동 실행");
          })();
          
          //두번째 호출 - 호출되는 시점에 함수 실행
          show();

			 
			 
        </script>
    </head>
    <body>
    </body>
</html>
