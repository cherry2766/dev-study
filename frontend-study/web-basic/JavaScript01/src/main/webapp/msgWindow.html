<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
        <title>공지사항 창</title>
		<script type="text/javascript">
		    function winClose() {
		    	window.close();
		    	opener.focus(); // 현재 창을 연 부모창(opener)에 포커스를 주기
		    }

		</script>
	</head>		
	<!-- setTimeout 윈도우 객체의 메소드 1/1000 단위 사용, 전달되는 콜백함수 1번 호출-->
	<body onLoad="setTimeout('winClose()',3000)" > <!-- body 태그가 준비되고 3초 후에 winClose() 호출, 1번만 호출-->
    	공지 사항<br>
         이 창은 3초 후에 자동으로 닫힙니다.    	
	</body>
</html>
