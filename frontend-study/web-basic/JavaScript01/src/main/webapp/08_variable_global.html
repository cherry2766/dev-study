<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>전역변수</title>
		<script type="text/javascript">
		   //전역변수 범위 - 모든 영역에서 공용으로 사용하는 변수
		   var x=5, y=10; // x,y 변수 명시적 선언, 전역변수
		   total = 0; // 명시적 선언 없이 사용, 전역변수
			
			function f1() {
				  //함수 내부에서 변수 사용, 전역변수 사용
				  x = x + y;
				document.write(x + "<br>");
			}
		
			function f2() {
				  //함수 내부에서 변수 사용
				  total = x + y;
				  document.write(x + "<br>");
			}
			
			// 함수 사용 : 함수 호출
			f1();
			f2();
			
			document.write(total  + "<br>"); 
			
		</script>
	</head>
	<body>
		
	</body>
</html>
