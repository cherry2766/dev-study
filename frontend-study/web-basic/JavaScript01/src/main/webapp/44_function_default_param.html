<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>디폴트 매개변수</title>
		<script type="text/javascript">
		
		  //두 값을 전달받아(매개변수) 사각형의 넓이를 계산 후 반환(return)하는 함수
		  //매개변수의 기본값이 없으면 호출 시 인수는 매개변수의 개수와 같아야 함
		  //기본값이 있으면 전달되지 않은 인수의 매개변수는 기본 값을 사용함 : 기본값 매개변수 =  값
		  function rect(width=10, height=20) {
			  document.write("width : " + width);
			  document.write("height : " + height);
			   return width * height;
		  }
			
			console.log(rect());   // 값을 전달하지 않으면 디폴트 매개변수 width, height 로 사용
			console.log(rect(30));   // 값을 1개 전달하면 첫 번째 매개변수가 받고, 두번째는 디폴트 매개변수 사용
			//인수가 1개 전달될 때 전달되는 값은 첫번째 매개변수로 전달 됨(첫번째 매개변수는 디폴트, 두번째 매개변수는 전달하는 인수로 사용은 불가)
			console.log(rect(100, 200)); // 값을 2개 다 전달하면 전달받은 값으로 사용 (디폴트 매개변수 사용 안 함)
			
			
			// 일반 매개변수와 디폴트 매개변수를 섞어서 사용
			function showInfo(name, year=4, score) {
				document.write("name : " + name + "<br>");
				document.write("year : " + year + "<br>");
				document.write("score : " + score + "<br>");
			}

			console.log(showInfo());  // name은 값이 없고, year은 디폴트 매개변수 사용, score는 값이 없음(undefined)
			console.log(showInfo("홍길동"));  // name은 전달된 값, year은 디폴트 매개변수 사용, score 값 없음
			console.log(showInfo("홍길동", 80));  
			// name 전달된 값, year도 전달된 값 (두번째 매개변수가 두 번째 값을 받음 (디폴트 값 사용하지 않음)), score 값 없음
			// 주의 : 두 번재 매개변수 year 가 디폴트 값이 있더라도 순서대로 받기 때문에 year가 디폴트 매개변수를 사용하지 않고 전달된 값 사용
			// --> 디폴트 매개변수는 일반 매개변수보다 맨 뒤에 위치시킴
			
			document.write("<hr>");
			   function showInfo(name, score, year=4) {
			        document.write("name : " + name + "<br>");
			        document.write("year : " + year + "<br>");
			        document.write("score : " + score + "<br>");
			      }

			console.log(showInfo());  // name은 값이 없고, year은 디폴트 매개변수 사용, score는 값이 없음(undefined)
			console.log(showInfo("홍길동"));  // name은 전달된 값, year은 디폴트 매개변수 사용, score 값 없음
			console.log(showInfo("홍길동", 80));  // year은 디폴트 매개변수 값 사용
			console.log(showInfo("홍길동", 80, 1));  // year도 전달된 값 사용	
			
			////////////////////////////////////////////////////////////
			//익명 함수 : 함수 호이스팅 불가능
			//EL 표현 :jsp 사용시 jsp 일반 표현식보다 간결해서 많이 사용
			let rect1 = function(width=10, height=20) {
				return `사각형의 넓이 : ${width} X ${height} = ${width * height}` ;
				
			}
			
			// 화살표 함수 
			let rect2 = (width=10, height=20) =>`사각형의 넓이 : ${width} X ${height} = ${width * height}` ;
			
		</script>
	</head>
	<body>
		
	</body>
</html>
