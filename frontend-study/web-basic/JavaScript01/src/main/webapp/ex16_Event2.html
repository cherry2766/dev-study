        //body 높이의 단위 : vh(창 높이에 따라 상대적인 크기 100일때 창의 높이와 동일)
        document.body.style.height = "100vh";
        
			  let content = document.getElementById('content');
			  content.addEventListener('dblclick',randomBackground); //이벤트 적용 영역 : body
			  
			  document.addEventListener('dblclick',randomBackground); //창의 전체영역에 이벤트 적용
		  }
		  
		  function randomBackground() {
			  let r = Math.floor(Math.random()*256); //0~255 사이의 난수 반환
			  let g = Math.floor(Math.random()*256);
			  let b = Math.floor(Math.random()*256);
			  
			  console.log(`rgb(${r}, ${g}, ${b})`);
			  document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
			  
		  }
