<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
        <title>중첩 for 문</title>
    	<script type="text/javascript">  
    	   // 1부터 5까지 출력 -> 5번 반복
    	   
    	   for (j=1;j<=5;j++) {
    		   for (i=1;i<=5;i++) {
    			   document.write(i +" "); //25번 반복
    		   }
    		   document.write("<br>"); //5번 반복
    	   }
    	   
    	   for (j=1;j<=4;j++) {
           for (i=1;i<=7;i++) {
             document.write("<img src=\"image/apple.png\">"); 
           }
           document.write("<br>"); 
         }
    	   //////////////////////연습문제 ex/////////////////////////////////////
    	   document.write("<hr>");
    	   for (j=1;j<=4;j++) {
           for (i=1;i<=7;i++) {
        	   if(i % 2 == 1) { // 2로 나눈 나머지가 0이면 짝수 1이면 홀수
        		   document.write("<img src='image/apple.png'>"); 
        	   }
        	   else {
        		   document.write("<img src='image/bomb.png'>"); 
        	   }
           }
           document.write("<br>");
         }
       </script> 
    </head>   
    <body>   	  
    </body>
</html>
