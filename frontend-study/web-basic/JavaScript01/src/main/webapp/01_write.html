<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>데이터 출력</title>
<script type="text/javascript">
  // 스크립트에 의해 text가 출력 - 동적으로 출력 컨텐츠를 생성
  document.write("hello");
  document.write("<h2>제목</h2>"); // document : body 태그 영역과 유사, write에 의해 text출력(태그는 해석됨)
  alert("<h3>데이터출력연습</h3>"); // window.alert() -> 브라우저 창이 실행 주체
  console.log("console 출력, 개발자도구에서 확인");
  console.log("<h3>test</h3>");
  console.log('1+3');
  alert(1+3);
</script>
</head>
<body>
  <h1>body 본문에서 출력</h1>
</body>
</html>
