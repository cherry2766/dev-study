<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>함수 매개변수</title>
		<script type="text/javascript">  
		  //예금액 이자율 입력 받아서 이자를 계산하는 프로그램
		  function calInterest(deposit,rate=1) { //매개변수 - 지역변수(함수 내에서만 사용)
			  // var rate = 1; //고정 이자율
			  var interest = deposit * rate / 100; //이자액 계산 (퍼센트로 전달되므로)
			  return interest;
		  }
			function input() {
				//함수 내에서 var 사용 변수 선언 - 지역변수(함수 내에서만 사용가능)
				var deposit = parseInt(prompt("예금액 입력"));
				var rate = Number(prompt("이자율 입력"));
				//이자 계산 함수 호출(인수 전달)
				document.write("이자액(고정 이자율 사용) : " + calInterest(deposit) + "<br>");
				document.write("이자액(입력 이자율 사용) : " + calInterest(deposit, rate));
			}			
        </script>    
	</head>
	<!-- input() 호출 시점 body 태그의 onLoad라는 이벤트가 발생하면 호출 -->
	<!-- body태그가 해석되고 브라우저에 의해 태그가 표현되면 발생되는 이벤트 : onLoad -->
	<body onLoad="input()">
	
	</body>
</html>
