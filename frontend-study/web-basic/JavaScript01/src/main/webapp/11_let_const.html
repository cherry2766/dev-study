<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>let과 const</title>
		<script type="text/javascript">
		  //let 변수 선언, const 상수 선언
		  //변수 : 재할당 가능, 상수: 재할당 불가능
		  let name="홍길동";
		  console.log(name);
		  
		  const name2="김철수"; //첫번째 값 저장
		  console.log(name2);
		  
		  name="강길동"; //재할당
		  // name2="최철수"; //재할당(오류 : 상수이기 때문에 재할당 불가능)
		  console.log(name);
		  console.log(name2);

		</script>
	</head>
	<body>
		
	</body>
</html>
