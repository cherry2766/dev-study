<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
        <title>createElement('h3') 예제</title>
        <script type="text/javascript">
        //body 태그 내부에 동적으로 h3 태그 생성
        //body 태그는 load 되어 있어야 h3 태그 동적 추가 가능
        window.onload = function() {
        	//요소(태그) 객체 생성
        	//1.필요 객체 생성
        	let h3_var = document.createElement('h3'); //객체 참조값 반환
        	let text_var = document.createTextNode("출력할 텍스트 : 홍길동, 동적 생성 문자열");
        	// 각 객체 독립적으로 생성됨
        	
        	//2.생성된 객체들 연결(포함)하는 작업
        	//태그 객체에 텍스트 객체를 자식 요소로 포함
        	h3_var.appendChild(text_var);
        	
        	//3.완성된 요소를 body에 추가
        	document.body.appendChild(h3_var);
        }

		</script>
	</head>
	
	<body>
	<!--내부 정적태그 없음 -->
	</body>
</html>
