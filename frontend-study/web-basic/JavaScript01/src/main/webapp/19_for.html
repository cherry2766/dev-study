<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
        <title>for문</title>    
        <script type="text/javascript">
        
          var i;
          var sum = 0;
        
          for (i=1;i<=10;i++) {
        	    document.write("i= "+i+"<br>");
        	    sum +=i;  
          }
              document.write("sum = " + sum); // 반복 종료 후 1~10까지 더한 결과값 출력
				 
     </script> 
     </head>    
     <body>   	  
     </body>
 </html>
