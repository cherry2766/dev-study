<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>querySelector()</title>
		<script type="text/javascript">
		  //문서 내 첫번째 h1 태그 참조값 반환받아서 속성 변경
		  //태그 준비 된 후 작업 진행
		  window.onload = function() {
			  //문서 내 객체를 선택 : querySelector(선택자)
			  let header = document.querySelector('h1'); // h1 태그 중 첫번째 태그 요소 객체의 참조값 반환
			  
			  //문서 내 객체를 참조값을 이용해서 조작 가능
			  //속성 변경
			  header.style.color = 'orange';
			  header.style.background = 'red';
			  header.innerHTML = 'From Javascript';
		  }

		</script>
	</head>
	<body>
		<h1>Header</h1>
		<h1>Header</h1>
		<h1>Header</h1>
	</body>
</html>
